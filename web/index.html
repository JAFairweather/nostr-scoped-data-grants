<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#141110">
<title>Nontact</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%231c1815'/%3E%3Cpath d='M19 47V19l26 28V19' stroke='%23e07a4f' stroke-width='8' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
<script type="importmap">
{
  "imports": {
    "nostr-tools": "https://esm.sh/nostr-tools@2.23.9?bundle",
    "nostr-tools/pool": "https://esm.sh/nostr-tools@2.23.9/pool?bundle"
  }
}
</script>
<style>
  /* Warm ink palette — Nontact sits under the warm.contact umbrella.
     Semantics: coral = act, green = sharing, amber = stale/draft, red = destroy. */
  :root {
    --bg: #141110; --panel: #1c1815; --panel2: #262019; --line: #362e27;
    --text: #ede5da; --dim: #a3968a;
    --accent: #e07a4f; --accent-ink: #221109;
    --ok: #85bb8f; --warn: #d9a648; --danger: #e06651;
    --mono: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  header {
    display: flex; align-items: baseline; gap: 14px; padding: 22px 28px 0;
    max-width: 1180px; margin: 0 auto;
  }
  header h1 { margin: 0; font-size: 26px; letter-spacing: -0.5px; }
  header h1 span { color: var(--accent); }
  header .tag { color: var(--dim); font-size: 14px; }
  header .spacer { flex: 1; }
  header button { margin-left: 8px; }

  main { max-width: 1180px; margin: 0 auto; padding: 18px 28px 60px; }

  /* Button scale: primary (commit), quiet (secondary), icon (single glyph). */
  button {
    background: var(--panel2); color: var(--text); border: 1px solid var(--line);
    border-radius: 8px; padding: 8px 15px; font: inherit; font-size: 14px;
    cursor: pointer; transition: border-color 0.12s, color 0.12s, background 0.12s;
  }
  button:hover { border-color: var(--accent); }
  button.primary {
    background: var(--accent); border-color: var(--accent); color: var(--accent-ink);
    font-weight: 650;
  }
  button.primary:hover { background: #ea8a61; border-color: #ea8a61; }
  button.icon {
    width: 30px; height: 30px; padding: 0; display: inline-flex;
    align-items: center; justify-content: center; color: var(--dim);
  }
  button.icon:hover { color: var(--danger); border-color: var(--danger); background: none; }
  input:focus { outline: none; border-color: var(--accent) !important; }

  #login {
    max-width: 560px; margin: 10vh auto 0; background: var(--panel);
    border: 1px solid var(--line); border-radius: 14px; padding: 28px;
  }
  #login h2 { margin: 0 0 6px; }
  #login p { color: var(--dim); margin: 0 0 18px; }
  #login .row { display: flex; gap: 10px; }
  #login input {
    flex: 1; background: var(--bg); border: 1px solid var(--line); color: var(--text);
    border-radius: 8px; padding: 9px 12px; font-family: var(--mono); font-size: 13px;
  }
  #login .alt { margin-top: 14px; color: var(--dim); font-size: 13px; }
  #login .alt a { color: var(--accent); cursor: pointer; }
  #login .err { color: var(--warn); margin-top: 12px; font-size: 13px; min-height: 1em; }

  #me { display: none; align-items: center; gap: 10px; color: var(--dim); font-size: 13px; }
  #me code { font-family: var(--mono); color: var(--text); cursor: pointer; }

  #tabs { display: none; gap: 4px; margin: 18px 0 4px; border-bottom: 1px solid var(--line); }
  .tab {
    background: none; border: none; border-bottom: 2px solid transparent; border-radius: 0;
    color: var(--dim); padding: 8px 16px; font-size: 15px;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); }

  .suggest {
    font-size: 12px; padding: 3px 11px; border-radius: 999px;
    background: none; border: 1px dashed var(--line); color: var(--dim);
  }
  .suggest:hover { color: var(--ok); border-color: var(--ok); }
  .tchip { font-size: 13px; padding: 5px 14px; border-radius: 999px; }
  .tchip:hover { border-color: var(--accent); color: var(--accent); }
  .draft-badge { border-color: var(--warn); color: var(--warn); }

  #status { color: var(--dim); margin: 6px 0 18px; font-size: 13px; min-height: 1.2em; }

  #book, .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }

  .sect {
    font-size: 12px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--dim); margin: 0 0 12px;
  }
  .sect2 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--dim); margin-top: 4px; }
  .onecard {
    background: var(--panel); border: 1px solid #4a3b2e; border-radius: 14px;
    max-width: 780px;
  }
  .addbar {
    display: flex; flex-wrap: wrap; align-items: center; gap: 8px;
    padding: 14px 24px 18px;
  }
  .scopesec {
    padding: 16px 24px 20px; border-top: 1px solid var(--line);
    display: flex; flex-direction: column; gap: 12px;
  }
  .frow { display: flex; gap: 6px; margin: 3px 0; align-items: center; }
  .frow > .ficon { width: 22px; text-align: center; flex: none; font-size: 14px; }
  .frow input, .actions input {
    background: var(--bg); border: 1px solid var(--line); color: var(--text);
    border-radius: 6px; padding: 6px 10px; font: inherit; font-size: 13px; min-width: 0;
  }
  .frow .ftype { width: 24%; }
  .frow .fvalue { flex: 1; }
  .frow .flab { width: 20%; }
  .frow .del { width: 28px; height: 28px; flex: none; }
  .actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .actions input { flex: 1; font-family: var(--mono); font-size: 12px; }
  .msg { font-size: 12px; color: var(--dim); }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    display: inline-flex; align-items: center; gap: 6px; font-size: 12px;
    background: var(--panel2); border: 1px solid var(--line);
    border-radius: 999px; padding: 4px 6px 4px 12px;
  }
  .chip .unshare {
    border: none; background: none; color: var(--dim); padding: 0 5px;
    font-size: 14px; line-height: 1;
  }
  .chip .unshare:hover { color: var(--danger); }
  .chip.shared { border-color: var(--ok); color: var(--ok); }
  .card.ghosted { opacity: 0.62; border-style: dashed; }
  .badge.ghost-badge { border-style: dashed; }

  .card {
    background: var(--panel); border: 1px solid var(--line); border-radius: 14px;
    padding: 18px; display: flex; flex-direction: column; gap: 12px;
  }
  .card .head { display: flex; align-items: center; gap: 12px; }
  .avatar {
    width: 44px; height: 44px; border-radius: 50%; flex: none;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 16px; color: #241a12;
  }
  .who { min-width: 0; }
  .who .name { font-weight: 600; font-size: 16px; }
  .who .npub {
    font-family: var(--mono); font-size: 11px; color: var(--dim); cursor: pointer;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px;
  }
  .badges { display: flex; flex-wrap: wrap; gap: 6px; }
  .badge {
    font-size: 11px; padding: 2px 9px; border-radius: 999px;
    border: 1px solid var(--line); color: var(--dim);
  }
  .badge.shares { border-color: var(--ok); color: var(--ok); }
  .badge.revoked { border-color: var(--warn); color: var(--warn); }
  .badge.follows-you { border-color: var(--accent); color: var(--accent); }

  .scope { background: var(--panel2); border-radius: 10px; padding: 12px 14px; }
  .scope .sname { font-size: 12px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--dim); margin-bottom: 8px; display: flex; justify-content: space-between; }
  .scope .sname .gen { text-transform: none; letter-spacing: 0; }
  .field { display: flex; gap: 9px; align-items: baseline; padding: 2px 0; }
  .field .ficon { width: 18px; text-align: center; flex: none; }
  .field .fval { word-break: break-word; }
  .field .flabel { color: var(--dim); font-size: 12px; }
  .stale { color: var(--warn); font-size: 13px; }
  .nothing { color: var(--dim); font-size: 13px; font-style: italic; }

  .empty { color: var(--dim); text-align: center; margin-top: 8vh; }
  .empty code { font-family: var(--mono); color: var(--text); }
</style>
</head>
<body>
<header>
  <h1>N<span>on</span>tact</h1>
  <div class="tag">the no-maintenance address book</div>
  <div class="spacer"></div>
  <div id="me">
    <code id="my-npub" title="click to copy"></code>
    <button id="refresh">Refresh</button>
    <button id="logout">Log out</button>
  </div>
</header>
<main>
  <section id="login">
    <h2>Sign in</h2>
    <p>Your key never leaves this tab. Grants addressed to you are unwrapped
       locally; contact data is decrypted in the browser.</p>
    <div class="row" style="margin-bottom:10px">
      <button class="primary" id="nip07" style="flex:1">Sign in with extension (NIP-07)</button>
    </div>
    <div class="row">
      <input id="nsec" placeholder="…or paste nsec1… / 64-char hex (demo only)" autocomplete="off">
      <button id="go">Open</button>
    </div>
    <div class="alt">No key? <a id="gen">Generate a throwaway</a> — or run
      <code>npm run seed</code> for a pre-populated demo identity.</div>
    <div class="err" id="err"></div>
  </section>
  <nav id="tabs">
    <button class="tab active" data-tab="book">Address book</button>
    <button class="tab" data-tab="card">My card</button>
  </nav>
  <div id="status"></div>
  <section id="mycard" style="display:none"></section>
  <div id="book"></div>
</main>
<script type="module" src="/web/app.mjs"></script>
</body>
</html>
